<style>
/* ===== TOOLBAR (sort + view + dodaj) ===== */
.proposals-toolbar {
  display: flex;
  align-items: center;
  gap: .5rem;
  margin-bottom: .85rem;
  flex-wrap: wrap;
}

/* Divider */
.toolbar-divider {
  width: 1px;
  height: 20px;
  background: var(--border);
  flex-shrink: 0;
}

/* Sort */
.toolbar-sort {
  display: flex;
  align-items: center;
  gap: .3rem;
  flex: 1;
  flex-wrap: wrap;
}
.toolbar-sort-label {
  font-size: .75rem;
  color: var(--text-muted);
  white-space: nowrap;
  margin-right: .15rem;
}
.sort-btn {
  display: inline-flex;
  align-items: center;
  gap: .3rem;
  padding: .28rem .65rem;
  border-radius: .4rem;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  font-size: .78rem;
  text-decoration: none !important;
  transition: color .15s, border-color .15s, background .15s;
  white-space: nowrap;
}
.sort-btn:hover { color: var(--text-primary); border-color: rgba(255,255,255,.2); }
.sort-btn.active {
  color: var(--accent);
  border-color: rgba(0,209,178,.45);
  background: var(--accent-muted);
  font-weight: 500;
}
.sort-arrow {
  font-size: .65rem;
  opacity: .8;
  margin-left: 1px;
}

/* View toggle */
.toolbar-view {
  display: flex;
  gap: .3rem;
  flex-shrink: 0;
}
.view-toggle-btn {
  display: inline-flex;
  align-items: center;

  border: 1px solid var(--border);

  font-size: .82rem;
  transition: color .15s, border-color .15s, background .15s;
}
.view-toggle-btn:hover { color: var(--text-primary); border-color: rgba(255,255,255,.2); }
.view-toggle-btn.active { color: var(--accent); border-color: var(--accent); background: var(--accent-muted); }

/* Dodaj */
:root { --toolbar-add-color: var(--accent); --toolbar-add-shadow: rgba(0,209,178,.35); }
.toolbar-add-btn {
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  background: var(--toolbar-add-color);
  color: #111 !important;
  border: none;
  border-radius: .45rem;
  padding: .32rem .85rem;
  font-size: .82rem;
  font-weight: 600;
  text-decoration: none !important;
  transition: background .15s, box-shadow .15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.toolbar-add-btn:hover {
  filter: brightness(1.1);
  box-shadow: 0 0 10px var(--toolbar-add-shadow);
}

/* ===== PROPOSALS LIST / GRID ===== */
.proposals-list {
  display: flex;
  flex-direction: column;
  gap: .75rem;
}
.proposals-list.view-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: .75rem;
  align-items: start;
}
.proposals-list.view-grid > .tasks-section-label {
  grid-column: 1 / -1;
}
@media (max-width: 640px) {
  .proposals-list.view-grid { grid-template-columns: 1fr; }
}

/* ===== PROPOSAL CARD ===== */
.proposal-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: .65rem;
  overflow: hidden;
  transition: border-color .2s, box-shadow .2s;
  position: relative;
}

/* Cały kafelek — mocny glow na hover */
.proposal-card:hover {
  border-color: var(--accent);
  box-shadow:
    0 0 0 1px rgba(0,209,178,.4),
    0 0 12px rgba(0,209,178,.35),
    0 0 32px rgba(0,209,178,.15),
    0 6px 24px rgba(0,0,0,.4);
}
/* Gdy otwarte — stały tealowy border */
.proposal-card.open {
  border-color: rgba(0,209,178,.45);
  box-shadow: 0 0 0 1px rgba(0,209,178,.2), 0 0 12px rgba(0,209,178,.1);
}

/* ── Header ── */
.proposal-card-header {
  padding: .9rem 1.1rem .75rem;
  cursor: pointer;
  user-select: none;
  transition: background .15s;
}
/* Hover na header (nie child-elementy) — lekkie tło */
.proposal-card-header:hover {
  background: rgba(255,255,255,.025);
}
/* Gdy cursor jest nad child-elementem z własnym hover — anuluj tło headera */
.proposal-card-header:has(.proposal-author-link:hover),
.proposal-card-header:has(.proposal-details-inline:hover),
.proposal-card-header:has(.proposal-chat-link:hover) {
  background: transparent;
}
.proposal-card-header:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: -2px;
}

/* ── Tytuł ── */
.proposal-card-title-row {
  display: flex;
  align-items: flex-start;
  gap: .5rem;
  margin-bottom: .4rem;
}
.proposal-card-num {
  font-size: .72rem;
  color: var(--text-muted);
  font-weight: 600;
  flex-shrink: 0;
  padding-top: 2px;
}
.proposal-card-title {
  font-size: .95rem;
  font-weight: 600;
  color: var(--text-primary);
  flex: 1;
  min-width: 0;
  line-height: 1.35;
}
.proposal-card-chevron {
  color: var(--text-muted);
  font-size: .75rem;
  flex-shrink: 0;
  margin-top: 4px;
  transition: transform .2s ease;
}
.proposal-card.open .proposal-card-chevron {
  transform: rotate(180deg);
}

/* ── Badges ── */
.proposal-card-badges-row {
  display: flex;
  align-items: center;
  gap: .4rem;
  flex-wrap: wrap;
  margin-bottom: .55rem;
}

/* ── Preview tekstu (zwinięty) ── */
.proposal-preview {
  font-size: .82rem;
  color: var(--text-muted);
  line-height: 1.5;
  margin: 0 0 .55rem 0;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.proposal-card.open .proposal-preview { display: none; }

/* ── Meta strip (autor + data + szczegóły) ── */
.proposal-card-meta {
  display: flex;
  align-items: center;
  gap: .45rem;
  font-size: .75rem;
  color: var(--text-muted);
  flex-wrap: wrap;
}

/* Autor — klikalny link z własnym hover */
.proposal-author-link {
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  text-decoration: none !important;
  border-radius: .35rem;
  padding: 2px 5px 2px 2px;
  margin: -2px -5px -2px -2px;
  transition: background .15s;
}
.proposal-author-link:hover {
  background: rgba(255,255,255,.07);
}
.proposal-author-link:hover .proposal-author-name {
  color: var(--text-primary);
}
.proposal-author-avatar {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--accent);
  color: #111;
  font-size: .6rem;
  font-weight: 700;
  flex-shrink: 0;
  overflow: hidden;
}
.proposal-author-avatar img { width: 100%; height: 100%; object-fit: cover; }
.proposal-author-name {
  color: rgba(232,234,240,.75);
  font-weight: 500;
  transition: color .15s;
}

.proposal-meta-sep { opacity: .35; }
.proposal-date { color: var(--text-muted); }
.proposal-signatures { display: inline-flex; align-items: center; gap: .2rem; }

/* Szczegóły inline (zwinięty kafelek, prawy skraj mety) */
.proposal-details-inline {
  margin-left: auto;
  display: inline-flex;
  align-items: center;
  gap: .25rem;
  font-size: .75rem;
  font-weight: 500;
  color: var(--text-muted) !important;
  text-decoration: none !important;
  padding: 3px 8px;
  border-radius: .35rem;
  border: 1px solid transparent;
  transition: color .15s, border-color .15s, background .15s;
  white-space: nowrap;
}
.proposal-details-inline:hover {
  color: var(--accent) !important;
  border-color: rgba(0,209,178,.35);
  background: var(--accent-muted);
}

/* ── Body (rozwinięty) ── */
.proposal-card-body {
  border-top: 1px solid var(--border);
  padding: 0 1.1rem 1rem;
  display: flex;
  flex-direction: column;
  gap: .85rem;
  transition: background .15s;
}
.proposal-card-body:hover {
  background: var(--accent-muted);
  border-top-color: rgba(0,209,178,.35);
}

/* Szczegóły u góry ciała */
.proposal-body-topbar {
  display: flex;
  justify-content: flex-end;
  padding: .6rem 0 .25rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: .15rem;
}
.proposal-details-btn {
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  font-size: .8rem;
  font-weight: 600;
  color: var(--accent) !important;
  text-decoration: none !important;
  padding: .3rem .75rem;
  border: 1px solid rgba(0,209,178,.3);
  border-radius: .4rem;
  transition: background .15s, border-color .15s, box-shadow .15s;
}
.proposal-details-btn:hover {
  background: var(--accent-muted);
  border-color: var(--accent);
  box-shadow: 0 0 8px rgba(0,209,178,.2);
}

.proposal-section-label {
  font-size: .72rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: .3rem;
}
.proposal-section-label i { color: var(--accent); }
.proposal-section-text {
  font-size: .875rem;
  color: var(--text-primary);
  line-height: 1.6;
}

/* Empty state */
.proposals-empty {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--text-muted);
  font-size: .9rem;
}

/* ===== STEPPER NAV (globalne — Agora i Tasks) ===== */
:root {
  --arrow-h: 36px;
  --arrow-tip: 12px;
  --arrow-overlap: 1px;
  --stepper-color: #00d1b2;           /* domyślnie teal (Agora) */
  --stepper-color-muted: rgba(0,209,178,.12);
  --stepper-color-shadow: rgba(0,209,178,.55);
}

.stepper-nav {
  display: flex;
  align-items: center;
  gap: 0;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
  row-gap: .5rem;
}

/* Wrapper strzałki */
.stepper-step-wrap {
  position: relative;
  height: var(--arrow-h);
  clip-path: polygon(
    0 0,
    calc(100% - var(--arrow-tip)) 0,
    100% 50%,
    calc(100% - var(--arrow-tip)) 100%,
    0 100%
  );
  background: rgba(255,255,255,.04);
  margin-right: calc(-1 * var(--arrow-overlap));
  transition: filter .15s, background .15s;
}
/* Wszystkie poza pierwszym — wcięcie z lewej */
.stepper-step-wrap + .stepper-step-wrap {
  clip-path: polygon(
    0 0,
    calc(100% - var(--arrow-tip)) 0,
    100% 50%,
    calc(100% - var(--arrow-tip)) 100%,
    0 100%,
    var(--arrow-tip) 50%
  );
}
.stepper-step-wrap:hover {
  background: rgba(255,255,255,.08);
  filter: brightness(1.15);
  z-index: 2;
}
.stepper-step-wrap.active {
  background: var(--stepper-color-muted);
  filter: drop-shadow(0 0 6px var(--stepper-color-shadow));
  z-index: 3;
}

/* Link wewnątrz wrappera */
.stepper-step {
  display: inline-flex;
  align-items: center;
  gap: .45rem;
  height: 100%;
  padding: 0 calc(var(--arrow-tip) + .65rem) 0 calc(var(--arrow-tip) + .65rem);
  color: var(--text-muted);
  text-decoration: none !important;
  font-size: .82rem;
  white-space: nowrap;
  transition: color .15s;
}
.stepper-step-wrap:first-of-type .stepper-step {
  padding-left: .85rem;
}
.stepper-step:hover { color: var(--text-primary); }
.stepper-step-wrap.active .stepper-step {
  color: var(--stepper-color);
  font-weight: 600;
}

.stepper-step-num {
  font-size: .65rem;
  font-weight: 700;
  opacity: .6;
  flex-shrink: 0;
}
.stepper-step-wrap.active .stepper-step-num { opacity: 1; }

/* Separator */
.stepper-sep {
  width: 1px;
  height: 20px;
  background: var(--border);
  margin: 0 .65rem;
  flex-shrink: 0;
}

/* Przycisk "Dodaj" po prawej */
.stepper-add-btn {
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  height: var(--arrow-h);
  padding: 0 1rem;
  margin-left: auto;
  flex-shrink: 0;
  border-radius: .45rem;
  background: var(--stepper-color);
  color: #111 !important;
  font-size: .8rem;
  font-weight: 700;
  text-decoration: none !important;
  transition: background .15s, box-shadow .15s;
}
.stepper-add-btn:hover {
  filter: brightness(1.1);
  box-shadow: 0 0 10px var(--stepper-color-shadow);
}


/* Przycisk info (ikona ⓘ, Agora) */
.stepper-info-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: .45rem;
  background: var(--stepper-color-muted);
  border: 1px solid var(--stepper-color);
  color: var(--stepper-color);
  text-decoration: none !important;
  font-size: .95rem;
  font-weight: 700;
  transition: background .15s, box-shadow .15s;
  flex-shrink: 0;
  margin-right: .75rem;
}
.stepper-info-btn:hover {
  background: var(--stepper-color-muted);
  box-shadow: 0 0 10px var(--stepper-color-shadow);
  color: var(--stepper-color);
  filter: brightness(1.2);
}

/* Link "Odrzucone" (poza ścieżką, Agora) */
.stepper-rejected {
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  padding: .3rem .7rem;
  border-radius: .4rem;
  border: 1px solid var(--border);
  color: var(--text-muted);
  text-decoration: none !important;
  font-size: .78rem;
  transition: color .15s, border-color .15s;
  white-space: nowrap;
}
.stepper-rejected:hover { color: #f87171; border-color: rgba(239,68,68,.4); }
.stepper-rejected.active { color: #f87171; border-color: rgba(239,68,68,.5); background: rgba(239,68,68,.08); }
</style>
