{% extends 'home/base.html' %}
{% load i18n %}

{% block content %}
{% include 'glosowania/_card_styles.html' %}

<style>
/* ── Tasks stepper nav ── */
:root { --arrow-h: 36px; --arrow-tip: 12px; }

.tasks-nav-row {
  display: flex;
  align-items: center;
  gap: 0;
  margin-bottom: 1.25rem;
  overflow-x: auto;
  padding-bottom: 2px;
}

.tasks-stepper-btn {
  display: inline-flex;
  align-items: center;
  height: var(--arrow-h);
  padding: 0 1.35rem 0 1.6rem;
  font-size: .78rem;
  font-weight: 600;
  text-decoration: none !important;
  color: var(--text-muted);
  background: var(--bg-card);
  border: 1px solid var(--border);
  white-space: nowrap;
  transition: color .15s, background .15s, filter .15s;
  clip-path: polygon(
    var(--arrow-tip) 0%,
    calc(100% - var(--arrow-tip)) 0%,
    100% 50%,
    calc(100% - var(--arrow-tip)) 100%,
    var(--arrow-tip) 100%,
    calc(var(--arrow-tip) * 2) 50%
  );
  margin-right: -2px;
}
.tasks-stepper-btn:first-child {
  clip-path: polygon(
    0% 0%,
    calc(100% - var(--arrow-tip)) 0%,
    100% 50%,
    calc(100% - var(--arrow-tip)) 100%,
    0% 100%
  );
  padding-left: 1rem;
  border-radius: .35rem 0 0 .35rem;
}
.tasks-stepper-btn:hover {
  color: var(--text-primary);
  background: rgba(255,255,255,.06);
}
.tasks-stepper-btn.active {
  color: var(--accent);
  background: var(--accent-muted);
  filter: drop-shadow(0 0 6px rgba(0,209,178,.35));
}

.tasks-nav-add {
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  height: var(--arrow-h);
  padding: 0 1rem;
  margin-left: auto;
  flex-shrink: 0;
  border-radius: .45rem;
  background: var(--accent);
  color: #111 !important;
  font-size: .8rem;
  font-weight: 700;
  text-decoration: none !important;
  transition: background .15s, box-shadow .15s;
}
.tasks-nav-add:hover {
  background: #00b8a2;
  box-shadow: 0 0 10px rgba(0,209,178,.3);
}

/* ── Tasks list container ── */
.tasks-list {
  display: grid;
  grid-template-columns: 1fr;
  gap: .65rem;
}
.tasks-list.grid-view {
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
}

/* ── Empty state ── */
.tasks-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 3rem 1rem;
  color: var(--text-muted);
  gap: .55rem;
  text-align: center;
}

/* ── Section sub-labels (Moje zadania / Wspieram) ── */
.tasks-section-label {
  font-size: .7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: var(--text-muted);
  padding: .5rem 0 .3rem;
  display: flex;
  align-items: center;
  gap: .35rem;
  margin-top: .35rem;
}
.tasks-section-label i { color: var(--accent); }
.tasks-section-label:first-child { margin-top: 0; }

/* ── Assignee row inside card body ── */
.task-assignee-row {
  display: flex;
  align-items: center;
  gap: .5rem;
  font-size: .82rem;
  color: var(--text-muted);
  flex-wrap: wrap;
}
.task-assignee-label {
  font-size: .68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .05em;
}
.task-assignee-avatar {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: rgba(168,85,247,.25);
  color: #c084fc;
  font-size: .6rem;
  font-weight: 700;
  flex-shrink: 0;
  overflow: hidden;
}
.task-assignee-avatar img { width: 100%; height: 100%; object-fit: cover; }
.task-assignee-name { color: var(--text-primary); font-weight: 500; }

/* ── Vote + action row ── */
.task-vote-row {
  display: flex;
  align-items: center;
  gap: .45rem;
  flex-wrap: wrap;
}
.task-vote-btn {
  display: inline-flex;
  align-items: center;
  gap: .3rem;
  padding: .28rem .7rem;
  border-radius: .4rem;
  border: 1px solid var(--border);
  background: transparent;
  font-size: .78rem;
  cursor: pointer;
  transition: color .15s, border-color .15s, background .15s;
}
.task-vote-btn.up { color: #00bc8c; }
.task-vote-btn.up.active-vote { background: rgba(0,188,140,.15); border-color: rgba(0,188,140,.4); }
.task-vote-btn.up:hover { border-color: rgba(0,188,140,.4); background: rgba(0,188,140,.08); }
.task-vote-btn.down { color: var(--text-muted); }
.task-vote-btn.down.active-vote { background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.2); color: var(--text-primary); }
.task-vote-btn.down:hover { color: var(--text-primary); border-color: rgba(255,255,255,.2); background: rgba(255,255,255,.04); }

.task-take-btn {
  display: inline-flex;
  align-items: center;
  gap: .3rem;
  padding: .28rem .7rem;
  border-radius: .4rem;
  border: 1px solid rgba(0,209,178,.35);
  background: rgba(0,209,178,.08);
  color: var(--accent);
  font-size: .78rem;
  font-weight: 500;
  cursor: pointer;
  transition: background .15s, border-color .15s;
}
.task-take-btn:hover { background: rgba(0,209,178,.18); border-color: var(--accent); }

.task-resign-btn {
  display: inline-flex;
  align-items: center;
  gap: .3rem;
  padding: .28rem .7rem;
  border-radius: .4rem;
  border: 1px solid rgba(239,68,68,.3);
  background: transparent;
  color: #f87171;
  font-size: .78rem;
  font-weight: 500;
  cursor: pointer;
  transition: background .15s, border-color .15s;
}
.task-resign-btn:hover { background: rgba(239,68,68,.08); border-color: #f87171; }

/* ── Priority / status badges for tasks ── */
.badge-critical   { background: rgba(239,68,68,.15);  color: #f87171; }
.badge-important  { background: rgba(249,115,22,.15); color: #fb923c; }
.badge-beneficial { background: rgba(0,188,140,.15);  color: #00bc8c; }
</style>

<div class="container my-4">
  <nav class="tasks-nav-row">
    <a href="{% url 'tasks:list' %}?tab=mine&sort={{ current_sort }}&order={{ current_order }}"
       class="tasks-stepper-btn {% if current_tab == 'mine' %}active{% endif %}">
      {% trans 'Mine' %}
    </a>
    <a href="{% url 'tasks:list' %}?tab=awaiting&sort={{ current_sort }}&order={{ current_order }}"
       class="tasks-stepper-btn {% if current_tab == 'awaiting' %}active{% endif %}">
      {% trans 'Awaiting pickup' %}
    </a>
    <a href="{% url 'tasks:list' %}?tab=active&sort={{ current_sort }}&order={{ current_order }}"
       class="tasks-stepper-btn {% if current_tab == 'active' %}active{% endif %}">
      {% trans 'In progress' %}
    </a>
    <a href="{% url 'tasks:list' %}?tab=finished&sort={{ current_sort }}&order={{ current_order }}"
       class="tasks-stepper-btn {% if current_tab == 'finished' %}active{% endif %}">
      {% trans 'Finished' %}
    </a>
    <a href="{% url 'tasks:add' %}" class="tasks-nav-add">
      <i class="fas fa-plus"></i> {% trans 'Add task' %}
    </a>
  </nav>

  {% block tasks %}{% endblock %}
</div>
{% endblock %}
