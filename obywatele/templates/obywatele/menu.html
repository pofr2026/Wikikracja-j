{% extends 'home/base.html' %}
{% load static %}
{% load i18n %}

{% block content %}

<nav class="stepper-nav">
  <a href="{% url 'obywatele:parameters' %}"
     class="stepper-info-btn {% if request.resolver_match.url_name == 'parameters' %}active{% endif %}"
     title="{% trans 'Parametry' %}">
    <i class="fas fa-circle-info"></i>
  </a>
  <div class="stepper-step-wrap {% if request.resolver_match.url_name == 'obywatele' %}active{% endif %}">
    <a href="{% url 'obywatele:obywatele' %}" class="stepper-step">{% trans "Citizens" %}</a>
  </div>
  <div class="stepper-step-wrap {% if request.resolver_match.url_name == 'poczekalnia' %}active{% endif %}">
    <a href="{% url 'obywatele:poczekalnia' %}" class="stepper-step">{% trans "Candidates" %}</a>
  </div>
  <div class="stepper-step-wrap {% if request.resolver_match.url_name == 'assets' %}active{% endif %}">
    <a href="{% url 'obywatele:assets' %}" class="stepper-step">{% trans "Assets" %}</a>
  </div>
  <a href="{% url 'obywatele:zaproponuj_osobe' %}"
     class="toolbar-add-btn ms-auto">
    <i class="fas fa-plus"></i> {% trans "Invite" %}
  </a>
</nav>

{% block citizens %}{% endblock citizens %}

{% endblock %}
