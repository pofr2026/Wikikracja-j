{% load i18n %}
<tr>
	<td>
		<strong>{{ title }}</strong>
	</td>
	<td>
		<small class="text-muted">{{ description }}</small>
	</td>
	<td class="text-center">
		<div class="form-check form-switch d-inline-block">
			<input class="form-check-input" type="checkbox" id="toggle-{{ notification_type }}" 
				   {% if is_enabled %}checked{% endif %}
				   data-url="{% url 'obywatele:toggle_notification' %}?type={{ notification_type }}">
		</div>
	</td>
	<td class="text-center">
		<span id="status-{{ notification_type }}" 
			  class="badge {% if is_enabled %}bg-success{% else %}bg-secondary{% endif %}"
			  data-enabled-text="{% trans 'Enabled' %}"
			  data-disabled-text="{% trans 'Disabled' %}"
			  data-error-text="{% trans 'Error' %}">
			{% if is_enabled %}{% trans "Enabled" %}{% else %}{% trans "Disabled" %}{% endif %}
		</span>
	</td>
</tr>
